<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#f6f3ee" />
		<title>Fete Finder Offline</title>
		<style>
			:root {
				color-scheme: light dark;
				--background: #f6f3ee;
				--foreground: #1d1712;
				--muted: #6f6258;
				--border: #d8cabd;
				--accent: #184b50;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--background: #15110d;
					--foreground: #f8efe4;
					--muted: #c5b7a8;
					--border: #3d332b;
					--accent: #9ec9cc;
				}
			}

			* {
				box-sizing: border-box;
			}

			body {
				min-height: 100vh;
				margin: 0;
				background: var(--background);
				color: var(--foreground);
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
					"Segoe UI", sans-serif;
			}

			main {
				display: grid;
				min-height: 100vh;
				align-content: center;
				gap: 1.25rem;
				padding: max(env(safe-area-inset-top), 2rem)
					max(env(safe-area-inset-right), 1.25rem)
					max(env(safe-area-inset-bottom), 2rem)
					max(env(safe-area-inset-left), 1.25rem);
			}

			section {
				width: min(100%, 34rem);
				margin: 0 auto;
			}

			p {
				max-width: 30rem;
				margin: 0;
				color: var(--muted);
				font-size: 1rem;
				line-height: 1.55;
			}

			.eyebrow {
				margin-bottom: 0.75rem;
				color: var(--accent);
				font-size: 0.72rem;
				font-weight: 700;
				letter-spacing: 0.14em;
				text-transform: uppercase;
			}

			h1 {
				max-width: 32rem;
				margin: 0 0 1rem;
				font-family: Georgia, "Times New Roman", serif;
				font-size: clamp(2.4rem, 12vw, 4.75rem);
				font-weight: 400;
				letter-spacing: 0;
				line-height: 0.95;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem;
				margin-top: 1.5rem;
			}

			a,
			button {
				min-height: 2.75rem;
				border: 1px solid var(--border);
				border-radius: 999px;
				background: transparent;
				color: var(--foreground);
				font: inherit;
				font-weight: 700;
				padding: 0.75rem 1rem;
				text-decoration: none;
			}

			button {
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<main>
			<section>
				<p class="eyebrow">Out Of Office Collective</p>
				<h1>Fete Finder is offline</h1>
				<p>
					Reconnect to refresh the latest guide. If you already had Fete
					Finder open, return to that tab to keep browsing saved event data,
					search, filters, and plans.
				</p>
				<div class="actions">
					<button type="button" onclick="window.location.reload()">Try again</button>
					<a href="/">Back to Fete Finder</a>
				</div>
			</section>
		</main>
	</body>
</html>
